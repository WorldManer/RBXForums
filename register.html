<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBXForums - Регистрация</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">RBXForums</div>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="forum.html">Форум</a></li>
                <li><a href="login.html">Вход</a></li>
                <li><a href="register.html">Регистрация</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="auth-container">
            <h2>Регистрация на RBXForums</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Имя пользователя:</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Подтверждение пароля:</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>
            <p>Уже есть аккаунт? <a href="login.html">Войдите</a></p>
        </div>
    </main>

    <script>
        // Ждем загрузки страницы
        document.addEventListener('DOMContentLoaded', function() {
            
            // Подключение к Supabase
            const supabaseUrl = 'https://ygpczdorqtoxchgwtcdu.supabase.co';
            const supabaseKey = 'sb_publishable_QWZrAGxsXt0xtot2lFdz3A_tOWokALJ';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            
            // Функция уведомлений
            function showMessage(text, type) {
                const msg = document.createElement('div');
                msg.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 20px;
                    background: ${type === 'error' ? '#f44336' : '#4CAF50'};
                    color: white;
                    border-radius: 5px;
                    z-index: 9999;
                `;
                msg.textContent = text;
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 3000);
            }
            
            // Обработчик формы
            document.getElementById('registerForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                // Проверка паролей
                if (password !== confirmPassword) {
                    showMessage('Пароли не совпадают!', 'error');
                    return;
                }
                
                if (password.length < 6) {
                    showMessage('Пароль должен быть минимум 6 символов!', 'error');
                    return;
                }
                
                try {
                    console.log('Попытка регистрации:', email);
                    
                    // Регистрация
                    const { data, error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                username: username
                            }
                        }
                    });
                    
                    if (error) {
                        console.error('Ошибка:', error);
                        showMessage('Ошибка: ' + error.message, 'error');
                        return;
                    }
                    
                    if (data.user) {
                        console.log('Успех:', data);
                        showMessage('Регистрация успешна! Проверьте email', 'success');
                        
                        // Очистка формы
                        document.getElementById('registerForm').reset();
                        
                        // Перенаправление через 3 секунды
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 3000);
                    }
                    
                } catch (err) {
                    console.error('Критическая ошибка:', err);
                    showMessage('Ошибка подключения к серверу', 'error');
                }
            });
        });
    </script>
</body>
</html>
