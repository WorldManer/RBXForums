<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBXForums - Регистрация</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">RBXForums</div>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="forum.html">Форум</a></li>
                <li><a href="login.html">Вход</a></li>
                <li><a href="register.html">Регистрация</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="auth-container">
            <h2>Регистрация на RBXForums</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Имя пользователя:</label>
                    <input type="text" id="username" required minlength="3" maxlength="30">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Подтверждение пароля:</label>
                    <input type="password" id="confirmPassword" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>
            <p>Уже есть аккаунт? <a href="login.html">Войдите</a></p>
        </div>
    </main>

    <script>
        // Инициализация Supabase
        const supabaseUrl = 'https://ygpczdorqtoxchgwtcdu.supabase.co';
        const supabaseKey = 'sb_publishable_QWZrAGxsXt0xtot2lFdz3A_tOWokALJ';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Функция для показа уведомлений
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Регистрация
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Валидация
            if (password !== confirmPassword) {
                showNotification('Пароли не совпадают', 'error');
                return;
            }
            
            if (password.length < 6) {
                showNotification('Пароль должен быть минимум 6 символов', 'error');
                return;
            }
            
            if (username.length < 3) {
                showNotification('Имя пользователя должно быть минимум 3 символа', 'error');
                return;
            }
            
            try {
                // Регистрация пользователя
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            username: username
                        }
                    }
                });
                
                if (error) throw error;
                
                if (data.user) {
                    showNotification('Регистрация успешна! Проверьте email для подтверждения', 'success');
                    
                    // Очищаем форму
                    document.getElementById('registerForm').reset();
                    
                    // Перенаправляем на страницу входа через 3 секунды
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                }
            } catch (error) {
                console.error('Ошибка регистрации:', error);
                
                if (error.message.includes('already registered')) {
                    showNotification('Этот email уже зарегистрирован', 'error');
                } else if (error.message.includes('weak password')) {
                    showNotification('Пароль слишком простой', 'error');
                } else {
                    showNotification('Ошибка: ' + error.message, 'error');
                }
            }
        });
    </script>
</body>
</html>
