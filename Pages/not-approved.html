<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ заблокирован</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app">
        <div class="ban-page">
            <i class="fas fa-ban ban-icon"></i>
            <h1>ДОСТУП ЗАБЛОКИРОВАН</h1>
            
            <div id="banInfo" class="ban-info">
                Загрузка информации...
            </div>
            
            <a href="/index.html" class="btn-primary">ВЕРНУТЬСЯ НА ГЛАВНУЮ</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ziwubecvahvlxxleqjid.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_b6_Wtue4ArK0M4cWFp5KfA_pD3E0QN2';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener('DOMContentLoaded', async () => {
            await loadBanInfo();
        });

        async function getUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return '0.0.0.0';
            }
        }

        async function loadBanInfo() {
            const banInfo = document.getElementById('banInfo');
            
            const currentIP = await getUserIP();
            const { data } = await supabase
                .from('banned_ips')
                .select('*')
                .eq('ip_address', currentIP)
                .single();
            
            if (data) {
                banInfo.innerHTML = `
                    <p><strong>Причина блокировки:</strong> ${data.reason || 'Не указана'}</p>
                    ${data.ban_expires ? `<p><strong>Срок действия:</strong> до ${new Date(data.ban_expires).toLocaleString()}</p>` : '<p><strong>Срок действия:</strong> навсегда</p>'}
                    <p><strong>Дата блокировки:</strong> ${new Date(data.banned_at).toLocaleString()}</p>
                `;
            } else {
                banInfo.innerHTML = '<p>Информация о блокировке не найдена</p>';
            }
        }
    </script>

    <style>
        .ban-page {
            text-align: center;
            padding: 100px 20px;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .ban-icon {
            font-size: 5rem;
            color: #ff4d4f;
            margin-bottom: 20px;
        }
        
        .ban-page h1 {
            color: #ff4d4f;
            margin-bottom: 30px;
        }
        
        .ban-info {
            background: #1a1a1a;
            padding: 30px;
            border: 1px solid #ff4d4f;
            margin: 20px auto 30px;
            max-width: 600px;
            border-radius: 4px;
        }
        
        .ban-info p {
            margin: 10px 0;
            color: #e0e0e0;
        }
    </style>
</body>
</html>
