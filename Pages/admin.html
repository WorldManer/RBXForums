<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBXForums — Админ-панель</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/script.js"></script>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="app">
        <div class="admin-container">
            <h2><i class="fas fa-shield-alt"></i> АДМИН-ПАНЕЛЬ</h2>
            
            <!-- Поиск пользователей -->
            <div class="admin-panel-section">
                <h3>ПОИСК ПОЛЬЗОВАТЕЛЯ</h3>
                <div class="search-user">
                    <input type="text" id="adminSearchUsername" placeholder="Введите ник" class="input-group">
                    <button class="btn-primary" onclick="searchUser()">НАЙТИ</button>
                </div>
                <div id="adminSearchResult"></div>
            </div>

            <!-- Список всех пользователей -->
            <div class="admin-panel-section">
                <h3>ВСЕ ПОЛЬЗОВАТЕЛИ</h3>
                <div id="usersList" class="users-list">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadNavbarAndFooter();
            await loadUsers();
            await loadSession();
            
            // Проверка прав доступа
            if (!currentUser || currentUser.role !== 'admin') {
                window.location.href = '403.html';
                return;
            }
            
            displayAllUsers();
        });

        function displayAllUsers() {
            const usersList = document.getElementById('usersList');
            
            let html = '';
            users.forEach(user => {
                html += `
                    <div class="user-row">
                        <div>
                            <strong>${user.username}</strong> (${user.roblox_nick || 'Нет ника'})
                            ${user.role === 'admin' ? '<span style="color: #888;"> [АДМИН]</span>' : ''}
                            ${user.banned ? '<span style="color: #ff4d4f;"> [ЗАБАНЕН]</span>' : ''}
                        </div>
                        <button onclick="window.location.href='profile.html?id=${user.id}'">ПРОСМОТР</button>
                    </div>
                `;
            });
            
            usersList.innerHTML = html;
        }

        async function searchUser() {
            const username = document.getElementById('adminSearchUsername').value;
            const resultDiv = document.getElementById('adminSearchResult');
            
            if (!username) return;
            
            const user = users.find(u => u.username === username);
            
            if (user) {
                resultDiv.innerHTML = `
                    <div class="user-row">
                        <div>
                            <strong>${user.username}</strong> (${user.roblox_nick || 'Нет ника'})
                            ${user.banned ? '<span style="color: #ff4d4f;">(Забанен)</span>' : ''}
                        </div>
                        <button onclick="window.location.href='profile.html?id=${user.id}'">ПРОСМОТР</button>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = '<p style="color: #888;">Пользователь не найден</p>';
            }
        }
    </script>
</body>
</html>
