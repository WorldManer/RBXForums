<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app">
        <div class="maintenance-page">
            <i class="fas fa-tools maintenance-icon"></i>
            <h1>ТЕХНИЧЕСКИЕ РАБОТЫ</h1>
            <p>Сайт временно недоступен. Ведутся технические работы.</p>
            <p class="small">Пожалуйста, зайдите позже</p>
            <p class="small" style="margin-top: 20px; color: #888;">Приносим извинения за неудобства</p>
        </div>
    </div>

    <style>
        .maintenance-page {
            text-align: center;
            padding: 100px 20px;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .maintenance-icon {
            font-size: 5rem;
            color: #888;
            margin-bottom: 20px;
            animation: spin 3s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .maintenance-page h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .maintenance-page p {
            color: #b0b0b0;
            font-size: 1.2rem;
            margin: 10px 0;
        }
        
        .maintenance-page .small {
            font-size: 1rem;
            color: #888;
        }
    </style>
</body>
</html>
