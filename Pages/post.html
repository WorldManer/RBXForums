<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBXForums — Просмотр темы</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="app">
        <div class="forum-container">
            <div id="postContainer">
                <!-- Пост загрузится сюда -->
            </div>

            <div class="comments-section">
                <div class="comments-title" id="commentsTitle">
                    <i class="fas fa-comments"></i> Комментарии
                </div>
                
                <div id="commentsList">
                    <!-- Комментарии загрузятся сюда -->
                </div>

                <div id="addCommentForm" class="add-comment hidden">
                    <textarea id="commentText" placeholder="Напишите комментарий..."></textarea>
                    <button onclick="addComment()">ОТПРАВИТЬ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
    <script>
        loadNavbarAndFooter();
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        
        if (!postId) {
            window.location.href = 'forum.html';
        } else {
            loadPost(postId);
        }
    </script>
</body>
</html>
