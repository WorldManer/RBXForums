<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBXForums — Форум</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="app">
        <div class="forum-container">
            <div class="forum-header">
                <h2><i class="fas fa-comments"></i> ФОРУМ</h2>
                <button class="forum-create-btn" onclick="checkAuthAndCreate()">
                    <i class="fas fa-plus"></i> СОЗДАТЬ ТЕМУ
                </button>
            </div>

            <div id="createPostPanel" class="forum-create-panel hidden">
                <h3>НОВАЯ ТЕМА</h3>
                <input type="text" id="postTitle" placeholder="Заголовок" class="input-group">
                <textarea id="postContent" placeholder="Текст сообщения..." class="input-group"></textarea>
                <button class="btn-primary" onclick="createPost()">ОПУБЛИКОВАТЬ</button>
                <button class="btn-secondary" onclick="hideCreatePost()">ОТМЕНА</button>
            </div>

            <div id="postsList" class="forum-posts">
                <!-- Посты будут загружаться сюда -->
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <!-- Сначала Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Потом наш скрипт -->
    <script src="script.js"></script>
    <script>
        // Ждем загрузки
        setTimeout(() => {
            loadNavbarAndFooter();
            loadForumPosts();
        }, 500);
        
        function checkAuthAndCreate() {
            if (typeof currentUser === 'undefined' || !currentUser) {
                window.location.href = 'login.html';
                return;
            }
            if (currentUser.banned) {
                alert('Вы забанены и не можете создавать посты');
                return;
            }
            document.getElementById('createPostPanel').classList.remove('hidden');
        }
        
        function hideCreatePost() {
            document.getElementById('createPostPanel').classList.add('hidden');
        }
        
        async function createPost() {
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            
            if (!title || !content) {
                alert('Заполните все поля');
                return;
            }
            
            try {
                const { data, error } = await supabase
                    .from('forum_posts')
                    .insert([{
                        user_id: currentUser.id,
                        username: currentUser.username,
                        roblox_nick: currentUser.roblox_nick || currentUser.username,
                        title: title,
                        content: content,
                        created_at: new Date().toISOString(),
                        comments: []
                    }]);
                
                if (error) {
                    console.error('Ошибка:', error);
                    alert('Ошибка при создании поста');
                } else {
                    window.location.href = 'forum.html';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при создании поста');
            }
        }
    </script>
</body>
</html>
