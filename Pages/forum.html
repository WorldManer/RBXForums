<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBXForums — Форум</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../script.js"></script>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="app">
        <div class="forum-container">
            <div class="forum-header">
                <h2><i class="fas fa-comments"></i> ФОРУМ</h2>
                <button class="forum-create-btn" onclick="checkAuthAndCreate()">
                    <i class="fas fa-plus"></i> СОЗДАТЬ ТЕМУ
                </button>
            </div>

            <div id="createPostPanel" class="forum-create-panel hidden">
                <h3>НОВАЯ ТЕМА</h3>
                <input type="text" id="postTitle" placeholder="Заголовок" class="input-group">
                <textarea id="postContent" placeholder="Текст сообщения..." class="input-group" rows="5"></textarea>
                <button class="btn-primary" onclick="createPost()">ОПУБЛИКОВАТЬ</button>
                <button class="btn-secondary" onclick="hideCreatePost()">ОТМЕНА</button>
            </div>

            <div id="postsList" class="forum-posts">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadNavbarAndFooter();
            await loadUsers();
            await loadForumPosts();
            await loadSession();
            displayPosts();
        });

        function displayPosts() {
            const postsList = document.getElementById('postsList');
            
            if (forumPosts.length === 0) {
                postsList.innerHTML = '<div class="empty-forum">Пока нет сообщений. Будьте первым!</div>';
                return;
            }

            let html = '';
            forumPosts.forEach(post => {
                const commentsCount = post.comments ? post.comments.length : 0;
                const date = formatDate(post.created_at);
                
                html += `
                    <div class="forum-post">
                        <div class="post-author">
                            <div class="author-avatar" onclick="window.location.href='profile.html?id=${post.user_id}'">
                                <i class="fas fa-user"></i>
                            </div>
                            <div>
                                <h4 onclick="window.location.href='profile.html?id=${post.user_id}'">${post.roblox_nick || post.username}</h4>
                                <div class="post-meta">${date}</div>
                            </div>
                        </div>
                        <div class="post-title">${post.title}</div>
                        <div class="post-content">${post.content.substring(0, 200)}${post.content.length > 200 ? '...' : ''}</div>
                        <div class="post-meta">
                            <i class="fas fa-comment"></i> ${commentsCount} комментариев
                        </div>
                        <a href="post.html?id=${post.id}" class="btn-secondary" style="margin-top: 15px;">ЧИТАТЬ</a>
                    </div>
                `;
            });
            
            postsList.innerHTML = html;
        }

        function checkAuthAndCreate() {
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            if (currentUser.banned) {
                alert('Вы забанены и не можете создавать посты');
                return;
            }
            document.getElementById('createPostPanel').classList.remove('hidden');
        }

        function hideCreatePost() {
            document.getElementById('createPostPanel').classList.add('hidden');
        }

        async function createPost() {
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            
            if (!title || !content) {
                alert('Заполните все поля');
                return;
            }
            
            try {
                const { error } = await supabase
                    .from('forum_posts')
                    .insert([{
                        user_id: currentUser.id,
                        username: currentUser.username,
                        roblox_nick: currentUser.roblox_nick || currentUser.username,
                        title: title,
                        content: content,
                        created_at: new Date().toISOString(),
                        comments: []
                    }]);
                
                if (error) {
                    alert('Ошибка при создании поста');
                } else {
                    window.location.reload();
                }
            } catch (error) {
                alert('Ошибка при создании поста');
            }
        }
    </script>
</body>
</html>
