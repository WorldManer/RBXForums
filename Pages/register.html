<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBXForums — Регистрация</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/script.js"></script>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="app">
        <div class="auth-container">
            <div class="auth-box">
                <h2>РЕГИСТРАЦИЯ</h2>
                
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <input type="text" id="regUsername" placeholder="Имя пользователя" class="input-group" required>
                    <input type="password" id="regPassword" placeholder="Пароль" class="input-group" required>
                    <input type="text" id="regRobloxNick" placeholder="Ник в Roblox" class="input-group" required>
                    
                    <button type="submit" class="btn-primary" style="width: 100%;">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                </form>
                
                <div id="registerError" class="error-message hidden"></div>
                
                <p style="margin-top: 20px; text-align: center;">
                    Уже есть аккаунт? <a href="login.html">Войти</a>
                </p>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadNavbarAndFooter();
            await loadUsers();
        });

        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const robloxNick = document.getElementById('regRobloxNick').value;
            
            const result = await registerUser(username, password, robloxNick);
            
            if (result.success) {
                alert('Регистрация успешна! Теперь войдите в аккаунт.');
                window.location.href = 'login.html';
            } else {
                const errorDiv = document.getElementById('registerError');
                errorDiv.textContent = result.error;
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
