<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBXForums — Пользователи</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../script.js"></script>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="app">
        <div class="users-container">
            <h2><i class="fas fa-users"></i> ПОЛЬЗОВАТЕЛИ</h2>
            
            <div class="search-user">
                <input type="text" id="searchUsername" placeholder="Поиск по нику..." class="input-group">
                <button class="btn-primary" onclick="searchUsers()">НАЙТИ</button>
            </div>

            <div id="usersList" class="users-grid">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadNavbarAndFooter();
            await loadUsers();
            await loadSession();
            displayAllUsers();
        });

        function displayAllUsers() {
            const usersList = document.getElementById('usersList');
            
            let html = '<div class="users-grid">';
            users.forEach(user => {
                if (!user.banned) {
                    html += `
                        <div class="user-card" onclick="window.location.href='profile.html?id=${user.id}'">
                            <div class="user-card-avatar">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="user-card-info">
                                <h4>${user.roblox_nick || user.username}</h4>
                                <p>${user.role === 'admin' ? 'Администратор' : 'Пользователь'}</p>
                            </div>
                        </div>
                    `;
                }
            });
            html += '</div>';
            
            usersList.innerHTML = html;
        }

        function searchUsers() {
            const searchTerm = document.getElementById('searchUsername').value.toLowerCase();
            const usersList = document.getElementById('usersList');
            
            const filteredUsers = users.filter(user => 
                !user.banned && 
                (user.username.toLowerCase().includes(searchTerm) || 
                 (user.roblox_nick && user.roblox_nick.toLowerCase().includes(searchTerm)))
            );
            
            if (filteredUsers.length === 0) {
                usersList.innerHTML = '<p style="text-align: center; color: #888;">Пользователи не найдены</p>';
                return;
            }
            
            let html = '<div class="users-grid">';
            filteredUsers.forEach(user => {
                html += `
                    <div class="user-card" onclick="window.location.href='profile.html?id=${user.id}'">
                        <div class="user-card-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="user-card-info">
                            <h4>${user.roblox_nick || user.username}</h4>
                            <p>${user.role === 'admin' ? 'Администратор' : 'Пользователь'}</p>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            
            usersList.innerHTML = html;
        }
    </script>

    <style>
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .user-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .user-card:hover {
            border-color: #888;
            transform: translateY(-2px);
        }

        .user-card-avatar {
            width: 50px;
            height: 50px;
            background: #2a2a2a;
            border: 2px solid #888;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #888;
        }

        .user-card-info h4 {
            color: #fff;
            margin-bottom: 5px;
        }

        .user-card-info p {
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</body>
</html>
