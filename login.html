<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBXForums - Вход</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">RBXForums</div>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="forum.html">Форум</a></li>
                <li><a href="login.html">Вход</a></li>
                <li><a href="register.html">Регистрация</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="auth-container">
            <h2>Вход на RBXForums</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
            <p>Нет аккаунта? <a href="register.html">Зарегистрируйтесь</a></p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            const supabaseUrl = 'https://ygpczdorqtoxchgwtcdu.supabase.co';
            const supabaseKey = 'sb_publishable_QWZrAGxsXt0xtot2lFdz3A_tOWokALJ';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            
            function showMessage(text, type) {
                const msg = document.createElement('div');
                msg.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 20px;
                    background: ${type === 'error' ? '#f44336' : '#4CAF50'};
                    color: white;
                    border-radius: 5px;
                    z-index: 9999;
                `;
                msg.textContent = text;
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 3000);
            }
            
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                try {
                    console.log('Попытка входа:', email);
                    
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) {
                        console.error('Ошибка:', error);
                        showMessage('Неверный email или пароль', 'error');
                        return;
                    }
                    
                    console.log('Успешный вход:', data);
                    showMessage('Вход выполнен успешно!', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'forum.html';
                    }, 1500);
                    
                } catch (err) {
                    console.error('Ошибка:', err);
                    showMessage('Ошибка подключения', 'error');
                }
            });
        });
    </script>
</body>
</html>
