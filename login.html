<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBXForums - Вход</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">RBXForums</div>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="forum.html">Форум</a></li>
                <li><a href="login.html">Вход</a></li>
                <li><a href="register.html">Регистрация</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="auth-container">
            <h2>Вход на RBXForums</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
            <p>Нет аккаунта? <a href="register.html">Зарегистрируйтесь</a></p>
        </div>
    </main>

    <script>
        // Инициализация Supabase
        const supabaseUrl = 'https://ygpczdorqtoxchgwtcdu.supabase.co';
        const supabaseKey = 'sb_publishable_QWZrAGxsXt0xtot2lFdz3A_tOWokALJ';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Вход
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                showNotification('Вход выполнен успешно!', 'success');
                
                // Перенаправляем на форум
                setTimeout(() => {
                    window.location.href = 'forum.html';
                }, 1000);
            } catch (error) {
                console.error('Ошибка входа:', error);
                
                if (error.message.includes('Invalid login')) {
                    showNotification('Неверный email или пароль', 'error');
                } else {
                    showNotification('Ошибка: ' + error.message, 'error');
                }
            }
        });
    </script>
</body>
</html>
